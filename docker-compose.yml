version: "3.8"

services:
  db:
    image: postgres:9.6
    container_name: esus_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: esus
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_POSTGRES_PASSWORD}
    volumes:
      - esus_db_data:/var/lib/postgresql/data
    ports:
      # Exponha só se precisar acessar o banco de fora do host (ex: pgAdmin remoto).
      # Em produção, prefira deixar comentado e usar SSH tunnel quando precisar.
      - "5433:5432"
    networks:
      - esus_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d esus"]
      interval: 10s
      timeout: 5s
      retries: 5

  pec:
    build:
      context: ./pec-installer
    container_name: esus_pec
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_URL: jdbc:postgresql://db:5432/esus
      DB_USERNAME: postgres
      DB_PASSWORD: ${DB_POSTGRES_PASSWORD}
    volumes:
      - esus_pec_data:/opt/esus
    networks:
      - esus_net
    # Não expõe porta pro host diretamente: o nginx é quem fala com o PEC.
    expose:
      - "8080"

  nginx:
    image: nginx:stable
    container_name: esus_nginx
    restart: unless-stopped
    depends_on:
      - pec
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/pec.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    networks:
      - esus_net

networks:
  esus_net:
    driver: bridge

volumes:
  esus_db_data:
  esus_pec_data:
